<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <title>Plot Twist</title>
        <link rel="stylesheet" href="/styles/style.css"/>
        <link rel="stylesheet" href="/styles/auth.css"/>
    </head>
    <body>

        <!-- HEADER -->
        <header class="site-header">
        <nav class="nav">
            <a href="index.html" class="logo">Plot Twist</a>
            <input type="checkbox" id="menu-toggle"/>
            <label for="menu-toggle" class="menu-icon">
            <i class="fa-solid fa-bars hamburger"></i>
            <i class="fa-solid fa-xmark close"></i>
            </label>
            <ul class="nav-links">
                <li><a href="/add-plant.html" class="add-plant">Add plant</a></li>
                <li id="loginItem"><a href="/login.html">Log in</a></li>
                <li><a href="/map.html">Map</a></li>
                <!-- <li class="account-item" id="accountItem"><a href="/register.html">Create new acount</a></li> -->
                <li class="profile-item" id="profileItem"><a href="/profile.html">Profile</a></li>
                <li class="logout-item" id="logoutItem"><a href="/index.html" id="logoutBtn">Log out</a>
            </ul>
        </nav>
        </header>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <section class="auth-container login">
                <!-- LOGIN FORM -->
                <form class="login-form">
                    <h2>Log into Plot Twist</h2>
                    <input id="emailInput" type="text" placeholder="Email" autocomplete="username">
                    <input id="passwordInput" type="password" placeholder="Password" autocomplete="password">
                    <button id="loginBtn" class="login-btn">Log in</button>
                    <a href="/forgot-password.html" class="login-link">Forgot password?</a>
                    <a href="/register.html" class="register-link">Create new account</a>
                </form>
            </section>
        </main>

        <!-- FOOTER -->
        <footer class="site-footer">
            <div class="footer-content">
                <p>&copy; 2026 Plot Twist. All rights reserved.</p>
                <div class="footer-links">
                </div>
            </div>
        </footer>

        <!-- PAGE-SPECIFIC JAVASCRIPT -->
        <script type="module" src="./src/scripts/auth.js"></script>
        <script type="module" src="./src/scripts/navbar.js"></script>
    </body>
</html>
