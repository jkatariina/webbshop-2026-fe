<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <title>Plot Twist</title>
        <link rel="stylesheet" href="/styles/style.css"/>
        <link rel="stylesheet" href="/styles/auth.css"/>
    </head>
    <body>

        <!-- HEADER -->
        <header class="site-header">
        <nav class="nav">
            <a href="index.html" class="logo">Plot Twist</a>
            <input type="checkbox" id="menu-toggle"/>
            <label for="menu-toggle" class="menu-icon">
            <i class="fa-solid fa-bars hamburger"></i>
            <i class="fa-solid fa-xmark close"></i>
            </label>
            <ul class="nav-links">
            <li><a href="/add-plant" class="add-plant">Add plant</a></li>
            <li><a href="/login.html" class="auth-link">Log in</a></li>
            <li><a href="/map">Map</a></li>
            <li><a href="/profile">Profile</a></li>
            </ul>
        </nav>
        </header>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <section class="auth-container register">
                <!-- SIGN UP FORM -->
                <form class="auth-box">
                    <h2>Sign up</h2>
                    <input id="fullnameInput" type="text" placeholder="Full name" autocomplete="Name">
                    <input id="usernameInput" type="text" placeholder="Username" autocomplete="username">
                    <input id="emailInput" type="text" placeholder="Email" autocomplete="email">
                    <input id="passwordInput" type="password" placeholder="Password" autocomplete="password">
                        <div class="terms">
                        <input type="checkbox" id="terms" name="terms" required>
                        <label for="terms">
                            By registering, I accept
                            <a href="/terms" target="_blank">Plot Twist's Terms and Conditions</a>
                            and have read the
                            <a href="/privacy" target="_blank">Privacy Policy</a>,
                            and confirm I am at least 18 years old.
                        </label>
                        </div>                   
                    <button id="submitBtn" class="submit-btn">Submit</button>
                </form>
            </section>
        </main>

        <!-- FOOTER -->
        <footer class="site-footer">
            <div class="footer-content">
                <p>&copy; 2026 Plot Twist. All rights reserved.</p>
                <div class="footer-links">
                </div>
            </div>
        </footer>

        <!-- PAGE-SPECIFIC JAVASCRIPT -->
        <script type="module" src="./src/scripts/auth.js"></script>
    </body>
</html>
